# Cohere Command A family — flagship agentic / tool-use models.
#
# Command A supports native tool calling (OpenAI-style `tools`, returns
# `tool_calls`; see https://docs.cohere.com/docs/tool-use-overview). We do NOT
# hard-pin `toolCalling: native` here only because tool support depends on the
# ENDPOINT you route through: some OpenAI-compatible proxies don't expose tool
# use for it (e.g. `cohere/command-a` via OpenRouter's default provider returns
# "no endpoints support tool use"). Leaving the route on `shim: auto` lets the
# probe adapt per deployment — native passthrough against a tool-supporting
# endpoint (Cohere's API / compatibility endpoint), or the prompted shim where
# the endpoint can't. Pin `shim: native` yourself once you've confirmed your
# endpoint serves tools.
- id: command-a-plus
  contextWindow: 256000
- id: command-a
  contextWindow: 256000
