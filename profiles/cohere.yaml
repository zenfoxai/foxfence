# Cohere Command A family — flagship agentic / tool-use models. Native
# (OpenAI-style) function calling and a normal system role when served through
# an OpenAI-compatible endpoint (Cohere's Compatibility API, vLLM, OpenRouter).
# Pinning `native` lets you skip the probe for deterministic production
# behavior. Context window is the Command A family's documented 256K — verify
# for your exact build/endpoint.
- id: command-a-plus
  capabilities:
    toolCalling: native
    parallelToolCalls: true
  contextWindow: 256000
- id: command-a
  capabilities:
    toolCalling: native
    parallelToolCalls: true
  contextWindow: 256000
