# Mistral AI models — native (OpenAI-style) tool calling and a normal system
# role; 128K context. Declaring native here lets you skip the probe in prod
# (deterministic) without a runtime downgrade.
#
# Mistral Small 3.x — verified against mistralai/mistral-small-3.2-24b-instruct
# via OpenRouter (returns native `tool_calls`); 3.1 shares the architecture,
# context window, and tool-calling behavior, 3.2 is the build measured.
# Ministral 8B — verified against mistralai/ministral-8b-2512 via OpenRouter;
# a strong native tool-caller despite its size.
- id: mistral-small-3.2
  capabilities:
    toolCalling: native
  contextWindow: 131072
- id: mistral-small-3.1
  capabilities:
    toolCalling: native
  contextWindow: 131072
- id: ministral-8b
  capabilities:
    toolCalling: native
  contextWindow: 131072
